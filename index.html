<script>

function esc(text) {
  return (text || '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function toolTemplate(tool) {
  const about = JSON.stringify(tool.about || 'لا توجد نبذة متاحة.');
  const limits = JSON.stringify(tool.limits || 'لا توجد حدود متاحة.');
  const example = JSON.stringify(tool.example || 'لا يوجد مثال متاح.');
  const name = JSON.stringify(tool.name);
  const nameLimits = JSON.stringify(tool.name + ' — الحدود');
  const nameExample = JSON.stringify(tool.name + ' — المثال');

  return `
    <article class="tool-card" data-name="${esc(tool.name)}">
      <div class="tool-head">
        <h4>${esc(tool.name)}</h4>
        <div class="tool-pdf-actions">
        </div>
      </div>
      <div class="tool-actions">
        <a class="action-btn chat-btn" href="${esc(tool.chatgpt || '#')}" target="_blank" rel="noopener">ChatGPT</a>
        <a class="action-btn gemini-btn" href="${esc(tool.gemini || '#')}" target="_blank" rel="noopener">Gemini</a>
      </div>
      <div class="tool-info">
        <button class="meta-btn" type="button" onclick='showInfoModal(${name}, ${about})'>حول البوت</button>
        <button class="meta-btn" type="button" onclick='showInfoModal(${nameLimits}, ${limits})'>الحدود</button>
        <button class="meta-btn" type="button" onclick='showInfoModal(${nameExample}, ${example})'>مثال</button>
      </div>
    </article>`;
}

function sectionTemplate(section, term) {
  const filteredTools = section.tools.filter(t => t.name.includes(term));
  if (!filteredTools.length) return '';
  return `
    <section class="subgroup" data-subgroup>
      <button class="subgroup-toggle" type="button" onclick="toggleSubgroup(this)">
        <span class="subgroup-title">${esc(section.title)}</span>
        <span class="subgroup-count">${filteredTools.length} نموذج</span>
      </button>
      <div class="subgroup-panel">
        <div class="tools-grid">${filteredTools.map(toolTemplate).join('')}</div>
      </div>
    </section>`;
}

function renderSections() {
  const term = document.getElementById('search').value.trim();
  const subgroups = document.getElementById('subgroups');
  const html = APP_DATA.sections.map(section => sectionTemplate(section, term)).join('');
  subgroups.innerHTML = html || '<div class="empty-state">لم يتم العثور على نماذج مطابقة لطلب البحث.</div>';
  const totalVisible = APP_DATA.sections.reduce((sum, section) => sum + section.tools.filter(t => t.name.includes(term)).length, 0);
  document.getElementById('resultCount').textContent = totalVisible;
}

function toggleSubgroup(button) {
  button.closest('.subgroup').classList.toggle('open');
}

function showInfoModal(title, body) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').textContent = body;
  document.getElementById('modal').style.display = 'block';
}

function openModal(key) {
  const titleMap = {about:'وصف',who:'من نحن',courses:'دوراتنا',news:'جديدنا',links:'روابط'};
  showInfoModal(titleMap[key] || 'معلومة', APP_DATA.modals[key] || '');
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
}

function backdropClose(e) {
  if (e.target.id === 'modal') closeModal();
}

function renderSocials() {
  const wrap = document.getElementById('socials');
  const iconMap = {
    'انستغرام': './instagram.svg',
    'فيس بوك': './facebook.svg',
    'يوتيوب': './youtube.svg',
    'لينكدين': './linkedin.svg',
    'البريد الإلكتروني': './gmail.svg',
    'باي بال': './paypal.svg'
  };
  const fallbackMap = {
    'رقم الواتساب': 'WA',
    'تليغرام': 'TG',
    'تيك توك': 'TT'
  };
  wrap.innerHTML = APP_DATA.socials.map(item => {
    const label = item[0];
    const href = item[1];
    const icon = iconMap[label];
    const iconHtml = icon
      ? `<img src="${icon}" alt="${esc(label)}">`
      : `<span class="fallback-icon">${fallbackMap[label] || label.slice(0,2)}</span>`;
    return `<a class="social-link" href="${esc(href)}" target="_blank" rel="noopener">${iconHtml}<span>${esc(label)}</span></a>`;
  }).join('');
}

document.getElementById('sectionCount').textContent = APP_DATA.sections.length;
document.getElementById('toolCount').textContent = APP_DATA.sections.reduce((sum, s) => sum + s.tools.length, 0);
renderSections();
renderSocials();
</script>
